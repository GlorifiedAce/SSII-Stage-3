<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Globalisation Ledger — Run an SME</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌏</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e1a24;
    --ink-2:#162a3c;
    --paper:#ecdfc0;
    --paper-dim:#d8c69d;
    --rust:#b35d2e;
    --rust-dim:#8a4520;
    --stamp:#9c2e22;
    --teal:#3c7a72;
    --teal-bright:#5fb3a8;
    --gold:#c99a3a;
    --ok:#7a9b5e;
    --bad:#b35d2e;
    --line: rgba(236,223,192,0.14);
    --shadow: 0 18px 40px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, rgba(236,223,192,0.025) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(90deg, rgba(236,223,192,0.025) 0 1px, transparent 1px 64px),
      radial-gradient(circle at 15% 10%, rgba(95,179,168,0.10), transparent 42%),
      radial-gradient(circle at 85% 90%, rgba(179,93,46,0.12), transparent 48%),
      var(--ink);
    color:var(--paper);
    font-family:'Newsreader', serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .app{
    width:100%;
    max-width:760px;
  }
  h1,h2,h3, .display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  /* ---------- Masthead ---------- */
  .masthead{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:2px solid var(--paper);
    padding-bottom:10px;
    margin-bottom:22px;
  }
  .masthead .title{
    font-size:1.5rem;
    font-weight:700;
    letter-spacing:0.03em;
  }
  .masthead .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;
    color:var(--paper-dim);
    text-transform:none;
    letter-spacing:0.02em;
  }
  .masthead-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:7px;
  }
  .sound-toggle{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid var(--paper-dim);
    color:var(--paper-dim);
    padding:4px 9px;
    border-radius:20px;
    cursor:pointer;
    transition: border-color .15s ease, color .15s ease;
    white-space:nowrap;
  }
  .sound-toggle:hover{ border-color:var(--gold); color:var(--gold); }
  .sound-toggle.on{ border-color:var(--teal-bright); color:var(--teal-bright); }
  .sound-toggle.on .eq span{ animation-play-state:running; }
  .sound-toggle .eq{ display:inline-flex; gap:2px; margin-right:5px; vertical-align:middle; }
  .sound-toggle .eq span{
    display:inline-block; width:2px; height:7px; background:currentColor;
    animation: eqBounce 0.9s ease-in-out infinite; animation-play-state:paused;
  }
  .sound-toggle .eq span:nth-child(2){ animation-delay:0.15s; }
  .sound-toggle .eq span:nth-child(3){ animation-delay:0.3s; }
  @keyframes eqBounce{ 0%,100%{ transform:scaleY(0.4); } 50%{ transform:scaleY(1.4); } }

  /* ---------- Manifest sheet (card) ---------- */
  .sheet{
    background: var(--ink-2);
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow: var(--shadow);
    position:relative;
    padding:28px 26px 26px;
    margin-bottom:20px;
    overflow:hidden;
  }
  .sheet::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:5px;
    background: repeating-linear-gradient(90deg, var(--rust) 0 14px, transparent 14px 22px);
    opacity:0.55;
  }
  .tab{
    position:absolute;
    top:14px; right:18px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.08em;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:3px 8px;
    border-radius:2px;
    transform:rotate(2deg);
  }

  /* ---------- Intro ---------- */
  .lede{
    font-size:1.02rem;
    line-height:1.65;
    color:var(--paper);
    margin-bottom:14px;
  }
  .lede b{color:var(--gold); font-weight:600;}
  .footnote{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    color:var(--paper-dim);
    line-height:1.6;
    border-top:1px dashed var(--line);
    padding-top:12px;
    margin-top:16px;
  }
  .btn-row{ display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
  .btn{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-size:0.85rem;
    font-weight:600;
    background:transparent;
    color:var(--paper);
    border:1.5px solid var(--paper);
    padding:12px 18px;
    border-radius:2px;
    cursor:pointer;
    transition:all .15s ease;
    text-align:left;
  }
  .btn:hover{ background:var(--paper); color:var(--ink); }
  .btn:focus-visible{ outline:2px solid var(--teal-bright); outline-offset:2px; }
  .btn.primary{ border-color:var(--rust); color:var(--rust); }
  .btn.primary:hover{ background:var(--rust); color:var(--paper); }
  .btn .small{
    display:block;
    font-family:'Newsreader', serif;
    text-transform:none;
    letter-spacing:normal;
    font-weight:400;
    font-size:0.82rem;
    margin-top:4px;
    opacity:0.85;
  }

  /* ---------- Industry picker ---------- */
  .industry-grid{ display:grid; gap:14px; }
  .industry-card{
    border:1.5px solid var(--line);
    background:var(--ink);
    border-radius:2px;
    padding:16px 18px;
    cursor:pointer;
    transition: border-color .15s ease, transform .15s ease;
  }
  .industry-card:hover{ border-color:var(--teal-bright); transform:translateX(3px); }
  .industry-card h3{ margin:0 0 6px; font-size:1.05rem; color:var(--gold); }
  .industry-card p{ margin:0; font-size:0.92rem; line-height:1.5; color:var(--paper); opacity:0.9; }
  .industry-card .who{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    color:var(--teal-bright);
    letter-spacing:0.03em;
    margin-top:8px;
    display:block;
  }

  /* ---------- Status bar ---------- */
  .statusbar{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .stat{
    background:var(--ink-2);
    padding:12px 10px;
    text-align:center;
  }
  .stat .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--paper-dim);
    display:block;
    margin-bottom:4px;
  }
  .stat .value{
    font-family:'IBM Plex Mono', monospace;
    font-size:1.15rem;
    font-weight:600;
  }
  .stat .delta{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    display:block;
    margin-top:2px;
    min-height:14px;
  }
  .delta.up{ color:var(--ok); }
  .delta.down{ color:var(--bad); }
  .year-pill{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:var(--ink);
    background:var(--gold);
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:12px;
  }

  /* ---------- Scenario ---------- */
  .scenario-title{
    font-size:1.15rem;
    color:var(--paper);
    margin:6px 0 10px;
  }
  .scenario-body{
    font-size:1rem;
    line-height:1.65;
    margin-bottom:20px;
  }
  .options{ display:grid; gap:10px; }

  /* ---------- Outcome / stamp ---------- */
  .outcome-wrap{ text-align:center; }
  .stamp{
    display:inline-block;
    border:3px solid var(--stamp);
    color:var(--stamp);
    border-radius:50%;
    width:150px; height:150px;
    display:flex; align-items:center; justify-content:center;
    transform:rotate(-9deg);
    margin:6px auto 18px;
    position:relative;
  }
  .stamp::before, .stamp::after{
    content:"";
    position:absolute;
    border:1px solid var(--stamp);
    border-radius:50%;
    inset:8px;
  }
  .stamp .stamp-text{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    font-weight:700;
    font-size:0.82rem;
    letter-spacing:0.06em;
    line-height:1.3;
  }
  .outcome-text{
    font-size:1rem;
    line-height:1.65;
    text-align:left;
    margin-bottom:14px;
  }
  .effect-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.85rem;
    text-align:left;
    margin:3px 0;
  }
  .effect-line.up{ color:var(--ok); }
  .effect-line.down{ color:var(--bad); }

  /* ---------- Final report ---------- */
  .verdict{
    font-size:1.35rem;
    color:var(--gold);
    margin:4px 0 6px;
  }
  .verdict-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--paper-dim);
    margin-bottom:18px;
  }
  svg text{ font-family:'IBM Plex Mono', monospace; }
  .insight-block{
    border-left:3px solid var(--teal);
    padding-left:14px;
    margin:14px 0;
  }
  .insight-block h4{
    margin:0 0 4px;
    font-size:0.88rem;
    color:var(--teal-bright);
    letter-spacing:0.03em;
  }
  .insight-block p{ margin:0; font-size:0.92rem; line-height:1.55; }
  .quote{
    font-style:italic;
    color:var(--paper);
    opacity:0.9;
  }
  .cite{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    color:var(--paper-dim);
  }

  /* ---------- Ambient background: trade routes ---------- */
  .bg-decor{
    position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none;
  }
  .bg-decor .drift{
    position:absolute; font-size:1.4rem; opacity:0.16; filter:grayscale(0.2);
    animation: driftAcross linear infinite;
  }
  @keyframes driftAcross{
    from{ transform:translateX(-8vw) translateY(0); }
    to{ transform:translateX(108vw) translateY(-18px); }
  }

  /* ---------- Masthead flourish ---------- */
  .masthead .title{ display:flex; align-items:center; gap:10px; }
  .globe-spin{
    display:inline-block;
    animation: slowSpin 14s linear infinite;
    font-size:1.15rem;
  }
  @keyframes slowSpin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ---------- Screen transition ---------- */
  #screen > *{ animation: sheetIn .45s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes sheetIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Industry icon badge ---------- */
  .industry-card{ display:flex; gap:14px; align-items:flex-start; }
  .industry-icon{
    flex:none;
    width:44px; height:44px;
    border-radius:50%;
    border:1.5px solid var(--teal-bright);
    background:var(--ink-2);
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem;
    transition:transform .2s ease;
  }
  .industry-card:hover .industry-icon{ transform:scale(1.12) rotate(-6deg); }
  .industry-body{ flex:1; }

  /* ---------- Trade-route year tracker ---------- */
  .route-tracker{ margin:2px 0 16px; }
  .route-track{
    position:relative; height:34px; margin:0 4px;
  }
  .route-line{
    position:absolute; top:50%; left:0; right:0; height:2px;
    background: repeating-linear-gradient(90deg, var(--paper-dim) 0 6px, transparent 6px 11px);
    transform:translateY(-50%);
    opacity:0.5;
  }
  .route-line-fill{
    position:absolute; top:50%; left:0; height:2px;
    background: var(--teal-bright);
    transform:translateY(-50%);
    width:0%;
    transition: width 1.1s cubic-bezier(.2,.7,.2,1);
    box-shadow:0 0 6px rgba(72,163,157,0.6);
  }
  .route-port{
    position:absolute; top:50%; width:14px; height:14px;
    border-radius:50%; transform:translate(-50%,-50%);
    background:var(--ink); border:2px solid var(--paper-dim);
    transition: background .3s ease, border-color .3s ease;
  }
  .route-port.reached{ background:var(--teal-bright); border-color:var(--teal-bright); }
  .route-port.now{ box-shadow:0 0 0 4px rgba(72,163,157,0.25); }
  .route-ship{
    position:absolute; top:50%; transform:translate(-50%,-58%);
    font-size:1.15rem; left:0%;
    transition: left 1.1s cubic-bezier(.2,.7,.2,1);
  }
  .route-labels{
    display:flex; justify-content:space-between;
    font-family:'IBM Plex Mono', monospace; font-size:0.62rem;
    color:var(--paper-dim); margin-top:4px; letter-spacing:0.04em;
  }

  /* ---------- Status bar micro-motion ---------- */
  .stat{ position:relative; }
  .stat.pulse .value{ animation: valuePulse .6s ease; }
  @keyframes valuePulse{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.16); color:var(--gold); }
    100%{ transform:scale(1); }
  }
  .stat .value{ display:inline-block; }

  /* ---------- Stamp slam ---------- */
  .stamp{ animation: stampSlam .5s cubic-bezier(.2,.9,.25,1.3) both; }
  @keyframes stampSlam{
    0%{ opacity:0; transform:scale(2.4) rotate(-24deg); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:scale(1) rotate(-9deg); }
  }

  /* ---------- Outcome burst ---------- */
  .burst-emoji{
    position:absolute; font-size:1.1rem; opacity:0;
    animation: burstUp 1.1s ease-out forwards;
    pointer-events:none;
  }
  @keyframes burstUp{
    0%{ opacity:0; transform:translateY(0) scale(0.6); }
    15%{ opacity:1; }
    100%{ opacity:0; transform:translateY(-60px) scale(1.1); }
  }

  /* ---------- Chart draw-in ---------- */
  .chart-path{
    stroke-dasharray:1; stroke-dashoffset:1;
    animation: drawPath 1.6s ease forwards;
  }
  @keyframes drawPath{ to{ stroke-dashoffset:0; } }

  .verdict-seal{ font-size:1.5rem; margin-right:6px; vertical-align:-2px; }

  @media (max-width:480px){
    .statusbar{ grid-template-columns:1fr; }
    .stamp{ width:120px; height:120px; }
    .bg-decor{ display:none; }
  }
  @media (prefers-reduced-motion: reduce){
    .industry-card, .btn{ transition:none; }
    .globe-spin, .drift, #screen > *, .stamp, .stat.pulse .value, .burst-emoji, .chart-path{ animation:none !important; }
    .route-line-fill, .route-ship{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="bg-decor" aria-hidden="true">
  <span class="drift" style="top:8%; animation-duration:52s; animation-delay:0s;">🚢</span>
  <span class="drift" style="top:62%; animation-duration:64s; animation-delay:-20s;">✈️</span>
  <span class="drift" style="top:34%; animation-duration:70s; animation-delay:-45s;">📦</span>
  <span class="drift" style="top:80%; animation-duration:58s; animation-delay:-8s;">🚢</span>
</div>
<div class="app">
  <div class="masthead">
    <div class="title"><span class="globe-spin" aria-hidden="true">🌐</span>The Globalisation Ledger</div>
    <div class="masthead-right">
      <div class="sub">SS II · SIMULATION EXERCISE</div>
      <button id="soundToggle" class="sound-toggle" onclick="toggleSound()" aria-pressed="false">
        <span class="eq" aria-hidden="true"><span></span><span></span><span></span></span><span id="soundLabel">🔇 Sound off</span>
      </button>

  <div id="screen"></div>

<script>
/* ============================================================
   AUDIO — fully synthesised with Web Audio API (no files, no
   copyrighted material). Master-toggled by the person; nothing
   plays until they opt in, satisfying browser autoplay rules.
   ============================================================ */
const AudioEngine = (() => {
  let ctx = null, master = null, musicOn = false;
  let schedulerTimer = null, nextNoteTime = 0, stepIndex = 0;
  const SCALE = [110.00,130.81,146.83,164.81,196.00,220.00]; // A minor pentatonic-ish, low & wandering
  const PATTERN = [0,2,3,2,4,2,1,3,0,5,3,2]; // slow melodic loop, indices into SCALE
  const STEP_DUR = 0.85;

  function ensure(){
    if(!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.5;
      master.connect(ctx.destination);
    }
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, start, dur, type, vol, filterFreq){
    const c = ctx;
    const osc = c.createOscillator();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(vol, start + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    let outNode = osc;
    if(filterFreq){
      const f = c.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = filterFreq;
      osc.connect(f); f.connect(g);
    } else {
      osc.connect(g);
    }
    g.connect(master);
    osc.start(start);
    osc.stop(start + dur + 0.05);
  }

  function noiseBurst(start, dur, vol, filterFreq, filterType){
    const c = ctx;
    const n = Math.max(1, Math.floor(c.sampleRate * dur));
    const buffer = c.createBuffer(1, n, c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<n;i++){ data[i] = (Math.random()*2-1) * (1 - i/n); }
    const src = c.createBufferSource();
    src.buffer = buffer;
    const f = c.createBiquadFilter();
    f.type = filterType || 'lowpass'; f.frequency.value = filterFreq || 1200;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    src.connect(f); f.connect(g); g.connect(master);
    src.start(start);
  }

  function playStep(i, time){
    const idx = PATTERN[i % PATTERN.length];
    tone(SCALE[idx], time, STEP_DUR * 0.95, 'triangle', 0.075, 1600);
    if(i % 6 === 0){ tone(SCALE[0] / 2, time, STEP_DUR * 6, 'sine', 0.05, 400); } // slow drone underneath
    if(i % 3 === 1){ noiseBurst(time, 0.05, 0.02, 4200, 'highpass'); } // soft clockwork tick
  }

  function schedule(){
    if(!ctx) return;
    while(nextNoteTime < ctx.currentTime + 0.6){
      playStep(stepIndex, nextNoteTime);
      stepIndex += 1;
      nextNoteTime += STEP_DUR;
    }
  }

  function startLoop(){
    ensure();
    musicOn = true;
    nextNoteTime = ctx.currentTime + 0.1;
    stepIndex = 0;
    schedule();
    schedulerTimer = setInterval(schedule, 200);
  }

  function stopLoop(){
    musicOn = false;
    if(schedulerTimer){ clearInterval(schedulerTimer); schedulerTimer = null; }
  }

  function isOn(){ return musicOn; }

  // ---- one-shot sound effects ----
  function stampThud(good){
    if(!musicOn) return; ensure();
    const t = ctx.currentTime;
    noiseBurst(t, 0.16, 0.3, 300, 'lowpass');
    tone(good ? 120 : 75, t, 0.3, 'sine', 0.22, 380);
  }
  function coinChime(){
    if(!musicOn) return; ensure();
    const t = ctx.currentTime;
    tone(1046.5, t, 0.22, 'triangle', 0.1);
    tone(1318.5, t + 0.06, 0.22, 'triangle', 0.08);
  }
  function pageTurn(){
    if(!musicOn) return; ensure();
    noiseBurst(ctx.currentTime, 0.2, 0.14, 2600, 'highpass');
  }
  function shipBell(){
    if(!musicOn) return; ensure();
    const t = ctx.currentTime;
    tone(880, t, 0.9, 'sine', 0.13, 3200);
    tone(1320, t, 0.9, 'sine', 0.06, 3200);
  }
  function closeBell(){
    if(!musicOn) return; ensure();
    const t = ctx.currentTime;
    tone(660, t, 1.1, 'sine', 0.12, 2800);
    tone(880, t + 0.18, 1.1, 'sine', 0.09, 2800);
  }

  return { startLoop, stopLoop, isOn, stampThud, coinChime, pageTurn, shipBell, closeBell };
})();

function toggleSound(){
  const btn = document.getElementById('soundToggle');
  const label = document.getElementById('soundLabel');
  if(AudioEngine.isOn()){
    AudioEngine.stopLoop();
    btn.classList.remove('on');
    btn.setAttribute('aria-pressed','false');
    label.textContent = '🔇 Sound off';
  } else {
    AudioEngine.startLoop();
    btn.classList.add('on');
    btn.setAttribute('aria-pressed','true');
    label.textContent = '🔊 Sound on';
  }
}

/* ============================================================
   DATA — grounded in the group's real interviews & secondary research
   ============================================================ */
const INDUSTRY_ICON = { precision: "⚙️", marine: "⚓", fashion: "👔" };

const INDUSTRIES = {
  precision: {

/* ============================================================
   STATE
   ============================================================ */
let state = null;

function newState(industryKey){
  const ind = INDUSTRIES[industryKey];
  return {
    industryKey,
    money: ind.startMoney,
    reputation: ind.startRep,
    sustainability: ind.startSus,
    risk: 20,
    yearIndex: 0,
    scenarioQueueForYear: [],
    scenarioPointer: 0,
    history: [{year:0, money: ind.startMoney, reputation: ind.startRep, sustainability: ind.startSus}],
    closed: false,
    closedReason: ""
  };
}

function yearMultiplier(year){ return 1 + (year - 1) * 0.18; }

function fmtMoney(n){
  const sign = n < 0 ? "-" : "";
  return sign + "$" + Math.round(Math.abs(n)).toLocaleString("en-US");
}
function clamp(n, lo, hi){ return Math.max(lo, Math.min(hi, n)); }

/* ============================================================
   RENDER HELPERS
   ============================================================ */
const screenEl = document.getElementById('screen');
function render(html){
  screenEl.innerHTML = html;
  window.scrollTo({top:0, behavior:'smooth'});
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      screenEl.querySelectorAll('[data-target-pct]').forEach(el=>{
        const prop = el.dataset.prop || 'width';
        el.style[prop] = el.dataset.targetPct + '%';
      });
    });
  });
}

function routeTrackerHTML(yearIndex){
  const total = 5;
  const pct = ((yearIndex-1) / (total-1)) * 100;
  const ports = Array.from({length: total}, (_, i) => {
    const p = i+1;
    const left = (i/(total-1))*100;
    const cls = p < yearIndex ? 'reached' : (p === yearIndex ? 'reached now' : '');
    return `<div class="route-port ${cls}" style="left:${left}%;" title="Year ${p}"></div>`;
  }).join('');
  return `
  <div class="route-tracker">
    <div class="route-track">
      <div class="route-line"></div>
      <div class="route-line-fill" data-target-pct="${pct}" data-prop="width" style="width:0%;"></div>
      ${ports}
      <div class="route-ship" data-target-pct="${pct}" data-prop="left" style="left:0%;">🚢</div>
    </div>
    <div class="route-labels"><span>🏠 Home port</span><span>🌏 Global market</span></div>
  </div>`;
}

function statusBarHTML(deltas){
  deltas = deltas || {};
  function deltaSpan(key, isMoney){
    if(!(key in deltas)) return '<span class="delta"></span>';
    const v = deltas[key];
    const cls = v > 0 ? 'up' : (v < 0 ? 'down' : '');
    const arrow = v > 0 ? '▲' : (v < 0 ? '▼' : '—');
    const text = isMoney ? fmtMoney(Math.abs(v)) : Math.abs(Math.round(v));
    return `<span class="delta ${cls}">${v===0? '—' : arrow + ' ' + text}</span>`;
  }
  const pulse = (key) => (key in deltas && deltas[key] !== 0) ? ' pulse' : '';
  return `
  <div class="statusbar">
    <div class="stat${pulse('money')}"><span class="label">💰 Money</span><span class="value">${fmtMoney(state.money)}</span>${deltaSpan('money', true)}</div>
    <div class="stat${pulse('reputation')}"><span class="label">🤝 Reputation</span><span class="value">${Math.round(state.reputation)}</span>${deltaSpan('reputation', false)}</div>
    <div class="stat${pulse('sustainability')}"><span class="label">🌱 Sustainability</span><span class="value">${Math.round(state.sustainability)}</span>${deltaSpan('sustainability', false)}</div>
  </div>`;
}

function startGame(industryKey){
  state = newState(industryKey);
  runYear();
}

function runYear(){
  state.yearIndex += 1;
  state.scenarioQueueForYear = SCENARIOS.filter(s => s.year === state.yearIndex);
  state.scenarioPointer = 0;
  showScenario();
}

function showScenario(lastDeltas){
  if(state.closed){ return screenClosed(); }
  if(state.scenarioPointer >= state.scenarioQueueForYear.length){
    state.history.push({year: state.yearIndex, money: state.money, reputation: state.reputation, sustainability: state.sustainability});
    if(state.yearIndex >= 5){ return screenFinalReport(); }
    return runYear();
  }
  const ind = INDUSTRIES[state.industryKey];
  const sc = state.scenarioQueueForYear[state.scenarioPointer];
  if(state.scenarioPointer === 0){ AudioEngine.shipBell(); } else { AudioEngine.pageTurn(); }
  const optionsHTML = sc.options.map((opt, i) => `
    <button class="btn" onclick="chooseOption(${i})">${String.fromCharCode(65+i)}. ${opt.label}</button>
  `).join("");

  render(`
    ${statusBarHTML(lastDeltas)}
    <div class="sheet">
      <div class="tab">YEAR ${state.yearIndex}</div>
      <span class="year-pill">${INDUSTRY_ICON[state.industryKey]} ${ind.name} · Year ${state.yearIndex} of 5</span>
      ${routeTrackerHTML(state.yearIndex)}
      <h2 class="scenario-title">${sc.title}</h2>
      <p class="scenario-body">${sc.body(ind)}</p>
      <div class="options">${optionsHTML}</div>
    </div>
  `);
}

function chooseOption(i){
  const sc = state.scenarioQueueForYear[state.scenarioPointer];
  const opt = sc.options[i];
  const mult = yearMultiplier(state.yearIndex);

  let effects = opt.effects;
  let outcomeText = opt.outcome;
  let succeeded = true;

  if(typeof effects.chance === 'number'){
    succeeded = Math.random() < effects.chance;
    if(!succeeded){
      effects = effects.failEffects;
      outcomeText = "Your application wasn't approved this round — competition for the scheme was fierce. A little time and effort spent, without the funding to show for it.";
    } else {
      outcomeText = "The grant comes through. It's not a cure-all, but it takes some pressure off your books and nudges you toward tools you'd been putting off.";
    }
  }

  const moneyDelta = state.money * (effects.moneyPct || 0) * mult;
  const repDelta = (effects.reputation || 0) * Math.min(mult, 1.6);
  const susDelta = (effects.sustainability || 0) * Math.min(mult, 1.6);
  const riskDelta = (effects.risk || 0);

  state.money = Math.max(0, state.money + moneyDelta);
  state.reputation = clamp(state.reputation + repDelta, 0, 100);
  state.sustainability = clamp(state.sustainability + susDelta, 0, 100);
  state.risk = clamp(state.risk + riskDelta, 0, 100);

  const deltas = { money: moneyDelta, reputation: repDelta, sustainability: susDelta };

  // supply-chain risk event: chance a stored risk triggers a disruption
  let disruptionNote = "";
  if(state.risk > 55 && Math.random() < 0.35){
    const hit = state.money * 0.06 * mult;
    state.money = Math.max(0, state.money - hit);
    state.sustainability = clamp(state.sustainability - 3, 0, 100);
    deltas.money -= hit;
    deltas.sustainability -= 3;
    disruptionNote = `<p class="outcome-text" style="color:var(--rust);">⚠ A geopolitical shipping delay hits your supply chain this year, costing you roughly ${fmtMoney(hit)} in disrupted orders.</p>`;
  }

  state.scenarioPointer += 1;

  if(state.money <= 0 || state.sustainability <= 5){
    state.closed = true;
    state.closedReason = state.money <= 0
      ? "Your cash reserves ran out."
      : "The business became commercially unviable — customers and orders had dried up.";
  }

  const positives = [moneyDelta>=0, repDelta>=0, susDelta>=0].filter(Boolean).length;
  const burstSet = positives >= 2 ? ['✨','📈','🌟'] : (positives <= 1 ? ['📉','⚠️','🍂'] : []);
  const burstHTML = burstSet.map((e,i)=>`<span class="burst-emoji" style="left:${20+i*28}%; top:8px; animation-delay:${i*0.12}s;">${e}</span>`).join('');

  AudioEngine.stampThud(positives >= 2);
  if(moneyDelta > 0){ setTimeout(() => AudioEngine.coinChime(), 140); }

  render(`
    ${statusBarHTML()}
    <div class="sheet outcome-wrap">
      <div class="tab">OUTCOME</div>
      ${burstHTML}
      <div class="stamp"><span class="stamp-text">${succeeded===false ? "DEFERRED" : (moneyDelta>=0 && susDelta>=0 ? "NOTED" : "PROCESSED")}</span></div>
      <p class="outcome-text">${outcomeText}</p>
      ${disruptionNote}
      <p class="effect-line ${moneyDelta>=0?'up':'down'}">${moneyDelta>=0?'▲':'▼'} 💰 Money: ${fmtMoney(moneyDelta)}</p>
      <p class="effect-line ${repDelta>=0?'up':'down'}">${repDelta>=0?'▲':'▼'} 🤝 Reputation: ${repDelta>=0?'+':''}${Math.round(repDelta)}</p>
      <p class="effect-line ${susDelta>=0?'up':'down'}">${susDelta>=0?'▲':'▼'} 🌱 Sustainability: ${susDelta>=0?'+':''}${Math.round(susDelta)}</p>
      <div class="btn-row">
        <button class="btn primary" onclick="continueAfterOutcome(${JSON.stringify(deltas).replace(/"/g,'&quot;')})">Continue ▸</button>
      </div>
    </div>
  `);
}

function continueAfterOutcome(deltas){
  showScenario(deltas);
}

function screenClosed(){
  const ind = INDUSTRIES[state.industryKey];
  AudioEngine.stampThud(false);
  render(`

    <div class="sheet outcome-wrap">

      <p class="outcome-text"><b>${ind.name} — Year ${state.yearIndex}.</b> ${state.closedReason} Your SME joins a growing number of Singaporean businesses that couldn't sustain themselves through the pressures of a globalised market — Singapore recorded around 60,000 business closures in 2025 alone, the highest in eight years.</p>
      <div class="btn-row">
        <button class="btn primary" onclick="screenFinalReport()">See the full report ▸</button>
      </div>
    </div>
  `);
}

function verdictFor(){
  const score = (state.reputation + state.sustainability) / 2;
  if(state.closed) return {label:"Folded Under Pressure", detail:"The business did not make it through the full five years.", seal:"🏚️"};
  if(score >= 72) return {label:"Thriving in the Global Market", detail:"Strong reputation and sustainability — this business adapted faster than the pressure arrived.", seal:"🌟"};
  if(score >= 52) return {label:"Surviving, But the Squeeze Continues", detail:"Standing, but still absorbing the costs of a more competitive, more connected market.", seal:"⚖️"};
  return {label:"On the Edge", detail:"Technically still open, but every year has chipped away at its resilience.", seal:"⚠️"};
}

function lineChartSVG(){
  const w = 660, h = 200, padL = 46, padR = 14, padT = 16, padB = 26;
  const years = state.history.map(h => h.year);
  const maxMoney = Math.max(...state.history.map(h=>h.money), 1);
  const x = (i) => padL + (i/(state.history.length-1)) * (w-padL-padR);
  const yMoney = (v) => padT + (1 - v/maxMoney) * (h-padT-padB);
  const yPct = (v) => padT + (1 - v/100) * (h-padT-padB);

  function pathFor(getter, yfn){
    return state.history.map((pt,i)=> `${i===0?'M':'L'} ${x(i).toFixed(1)} ${yfn(getter(pt)).toFixed(1)}`).join(' ');
  }
  const moneyPath = pathFor(p=>p.money, yMoney);
  const repPath = pathFor(p=>p.reputation, yPct);
  const susPath = pathFor(p=>p.sustainability, yPct);

  const yearLabels = years.map((yr,i)=> `<text x="${x(i)}" y="${h-6}" font-size="10" fill="var(--paper-dim)" text-anchor="middle">Y${yr}</text>`).join('');

  return `
  <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" role="img" aria-label="Chart of money, reputation and sustainability over five years">
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${h-padB}" stroke="var(--line)" stroke-width="1"/>
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--line)" stroke-width="1"/>
    ${yearLabels}
    <path class="chart-path" pathLength="1" d="${moneyPath}" fill="none" stroke="var(--gold)" stroke-width="2.2" style="animation-delay:0.1s;"/>
    <path class="chart-path" pathLength="1" d="${repPath}" fill="none" stroke="var(--teal-bright)" stroke-width="2.2" style="animation-delay:0.35s;"/>
    <path class="chart-path" pathLength="1" d="${susPath}" fill="none" stroke="var(--rust)" stroke-width="2.2" style="animation-delay:0.6s;"/>
  </svg>
  <div style="display:flex;gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;margin-top:6px;">
    <span><span style="color:var(--gold);">■</span> Money (scaled)</span>
    <span><span style="color:var(--teal-bright);">■</span> Reputation</span>
    <span><span style="color:var(--rust);">■</span> Sustainability</span>
  </div>`;
}

  const ind = INDUSTRIES[state.industryKey];

  render(`
